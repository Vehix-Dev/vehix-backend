version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-TUTU}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A config worker --loglevel=INFO
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/1
      DATABASE_HOST: db
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A config beat --loglevel=INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/1
      DATABASE_HOST: db
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
